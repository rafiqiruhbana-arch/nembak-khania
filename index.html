<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Khania ❤️</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    margin:0;
}
.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    max-width:500px;
}
button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}
.yes{
    background:#ff4d6d;
    color:white;
}
#result{
    margin-top:20px;
    font-size:20px;
    color:#ff4d6d;
}
</style>
</head>
<body>

<div class="card">
    <h1>Hai Khania ❤️</h1>
    <h2>Apakah kamu mau jadi pacar aku?</h2>

    <button class="yes" onclick="jawab()">Yes 😳</button>
    <button class="yes" onclick="jawab()">Yes Banget 🥺</button>

    <div id="result"></div>
</div>

<script>
function jawab(){
    document.getElementById("result").innerHTML =
    "YEAAYYY! 🎉<br><br>Mulai hari ini kamu resmi jadi orang favorit aku. ❤️<br><br>Aku janji bakal berusaha bikin kamu lebih sering senyum daripada ngambek. 🥰";
}
</script>

</body>
</html>
