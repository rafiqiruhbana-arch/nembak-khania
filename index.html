<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Khania ❤️</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:Arial,sans-serif;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);
height:100vh;
}
.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
}
.card{
background:white;
padding:35px;
border-radius:25px;
max-width:600px;
box-shadow:0 10px 40px rgba(0,0,0,.2);
z-index:2;
}
h1{
color:#ff4d6d;
margin-bottom:15px;
}
#typing{
font-size:18px;
line-height:1.7;
min-height:80px;
}
button{
padding:14px 25px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin:10px;
background:#ff4d6d;
color:white;
transition:.3s;
}
button:hover{
transform:scale(1.1);
}
.heart{
position:absolute;
font-size:20px;
animation:fall linear forwards;
}
@keyframes fall{
from{
transform:translateY(-10vh);
}
to{
transform:translateY(110vh);
opacity:0;
}
}
#page2{
display:none;
color:white;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
}
#loveLetter{
max-width:800px;
font-size:22px;
line-height:1.9;
padding:20px;
}
#counter{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
.confetti{
position:absolute;
width:10px;
height:10px;
animation:confettiFall linear forwards;
}
@keyframes confettiFall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
.big{
font-size:60px;
animation:pulse .8s infinite alternate;
}
@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.2);}
}
</style>
</head>
<body>
<div id="page1" class="page">
<div class="card">
<h1>Hai Khania ❤️</h1>
<div id="typing"></div>
<br>

YES 😳
YES BANGET 😭❤️

</div>
</div>
<div id="page2" class="page">
<div class="big">💖</div>
<h1>YEAAAAAYYYYY KHANIAAA 😭❤️</h1>
<div id="loveLetter"></div>
<div id="counter"></div>
</div>
<script>
let intro =
"Aku sebenernya udah lama pengen bilang ini... 🥺❤️";
let i=0;
function typeIntro(){
if(i<intro.length){
document.getElementById("typing").innerHTML+=intro.charAt(i);
i++;
setTimeout(typeIntro,50);
}
}
typeIntro();
function createHeart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=Math.random()>0.5?"❤️":"🌸";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+15)+"px";
h.style.animationDuration=(Math.random()*4+3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
}
setInterval(createHeart,250);
function confetti(){
for(let i=0;i<100;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,60%)`;
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),5000);
}
}
function accept(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";
confetti();
let text=`
🎉😭❤️ AKU SENENG BANGETTTT ❤️😭🎉
<br><br>
Jadi... sekarang ini resmi ya? 🥺👉👈
<br><br>
Aku masih gak nyangka dari semua kemungkinan jawaban yang ada...
kamu milih YES 😭💖
<br><br>
Makasih ya Khania 🌷❤️
Makasih udah hadir di hidup aku.
Makasih karena tanpa sadar kamu bikin hari-hari aku jadi lebih seru.
<br><br>
Aku suka cara kamu cerita.
Aku suka cara kamu ketawa.
Aku suka cara kamu jadi diri kamu sendiri. 🥺💕
<br><br>
Aku gak janji bakal selalu sempurna 😭
Aku juga pasti pernah salah.
Pasti pernah bikin kesel.
Pasti pernah bikin ngambek.
Tapi aku janji bakal selalu berusaha buat jadi seseorang yang bisa bikin kamu ngerasa dihargai ❤️
<br><br>
Kalau kamu lagi capek, aku mau dengerin.
Kalau kamu lagi sedih, aku mau nemenin.
Kalau kamu lagi bahagia, aku mau ikut seneng juga. 🫂💖
<br><br>
Pokoknya mulai hari ini...
Kamu resmi jadi orang favorit aku 😭❤️
Dan semoga aku juga bisa jadi orang favorit kamu 🥺👉👈
<br><br>
🌷💖🌷💖🌷💖🌷💖🌷
KHANIA
I LIKE YOU.
I CHOOSE YOU.
AND I'LL KEEP CHOOSING YOU.
😭❤️✨
<br><br>
🏆 ACHIEVEMENT UNLOCKED
💖 PACAR KHANIA 💖
`;
let idx=0;
function typeLetter(){
if(idx<text.length){
document.getElementById("loveLetter").innerHTML += text.charAt(idx);
idx++;
setTimeout(typeLetter,15);
}
}
typeLetter();
startCounter();
}
function startCounter(){
let startDate=new Date("2026-06-22");
setInterval(()=>{
let now=new Date();
let diff=now-startDate;
let days=Math.floor(diff/(1000*60*60*24));
document.getElementById("counter").innerHTML=
"❤️ Sudah jadi pacar selama "+days+" hari ❤️";
},1000);
}
</script>
</body>
</html>
