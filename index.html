<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Khania ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    overflow:hidden;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
}

/* BACKGROUND FLOAT HEART */
.heart{
    position:absolute;
    color:#ff4d6d;
    animation: floatUp linear infinite;
    font-size:20px;
    opacity:0.7;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-10vh);
    }
}

/* CARD */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.2);
    width:90%;
    max-width:500px;
    animation: pop 0.8s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0.5); opacity:0;}
    to{transform:translate(-50%,-50%) scale(1); opacity:1;}
}

/* TEXT */
h1{
    color:#ff4d6d;
}
#typing{
    min-height:60px;
    font-size:18px;
    margin:15px 0;
}

/* BUTTON */
button{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    margin:10px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
}

#yes{
    background:#ff4d6d;
    color:white;
    position:relative;
}

#no{
    background:#ddd;
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:red;
    top:-10px;
    animation: fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}

/* RESULT */
#result{
    margin-top:15px;
    font-size:18px;
    color:#ff4d6d;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>Hai Khania ❤️</h1>

    <div id="typing"></div>

    <button id="yes" onclick="yes()">YES 😳</button>
    <button id="no" onmouseover="moveNo()">NO 🙈</button>

    <div id="result"></div>
</div>

<script>

/* typing effect */
let text = "Aku gak tau kamu bakal jawab apa... tapi aku berharap kamu senyum waktu baca ini 🥺❤️";
let i = 0;

function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,50);
    }
}
typing();

/* floating hearts */
function heart(){
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    h.style.animationDuration = (Math.random()*3 + 2) + "s";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),5000);
}
setInterval(heart,200);

/* NO button kabur */
function moveNo(){
    let btn = document.getElementById("no");
    btn.style.position = "absolute";
    btn.style.top = Math.random()*80 + "vh";
    btn.style.left = Math.random()*80 + "vw";
}

/* confetti */
function confetti(){
    for(let i=0;i<40;i++){
        let c = document.createElement("div");
        c.classList.add("confetti");
        document.body.appendChild(c);

        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},100%,60%)`;
        c.style.animationDuration = (Math.random()*2 + 2) + "s";

        setTimeout(()=>c.remove(),3000);
    }
}

/* YES action */
function yes(){
    document.getElementById("result").innerHTML =
    "😭❤️ YEAYYYY!!<br>Kamu baru aja bikin hari aku paling bahagia 💖";

    confetti();
}

</script>

</body>
</html>
