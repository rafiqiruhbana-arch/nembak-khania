<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Khania ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

/* CARD */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    max-width:500px;
    text-align:center;
    z-index:10;
    animation: pop 1s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0.5); opacity:0;}
    to{transform:translate(-50%,-50%) scale(1); opacity:1;}
}

/* BUTTON */
button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.yes{
    background:#ff4d6d;
    color:white;
}

/* RESULT */
#result{
    margin-top:20px;
    font-size:20px;
    color:#ff4d6d;
}

/* FLOATING HEART */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation: fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh) translateX(0);
        opacity:1;
    }
    100%{
        transform:translateY(110vh) translateX(50px);
        opacity:0;
    }
}

/* POPUP LOVE BURST */
.big-love{
    font-size:60px;
    animation: pulse 0.6s infinite alternate;
}

@keyframes pulse{
    from{transform:scale(1);}
    to{transform:scale(1.3);}
}
</style>
</head>

<body>

<div class="card">
    <h1>Hai Khania ❤️</h1>
    <h2>Apakah kamu mau jadi pacar aku?</h2>

    <button class="yes" onclick="jawab()">Yes 😳</button>
    <button class="yes" onclick="jawab()">Yes Banget 🥺</button>

    <div id="result"></div>
</div>

<script>

// LOVE JATUH BACKGROUND
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);

// JAWABAN BUTTON
function jawab(){
    document.getElementById("result").innerHTML = `
        <div class="big-love">❤️</div>
        YEAAYYY!! 🎉<br><br>
        Mulai hari ini kamu resmi jadi orang favorit aku 🥺❤️<br><br>
        Aku bakal bikin kamu lebih sering senyum daripada badmood 💕
    `;
}

</script>

</body>
</html>
